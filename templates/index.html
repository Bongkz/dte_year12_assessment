<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beefy Buns</title>
    <!-- Link to css-->
    <link rel="stylesheet" href="/static/styles.css">
    <!--Link to bootstrap carousel-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <link rel="shortcut icon" type="x-icon" href="/static/assets/logo.png"> <!-- Adds Favicon on Window Tab-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> <!-- Footer Icons link -->
</head>
<body>
    <!--Nav bar-->
    <header>
      <nav class="nav_bar">
      <div class="nav-container">
          <div class="nav_logo">
          <a href="/"> <!-- Makes it link to index page -->
            <img class="logo" src="/static/assets/logo.png" alt="Beefy Buns Logo">
          </a>
          </div>
          <!--Nav links-->
          <ul class="nav_links">
            <!-- Main nav links -->
              <li><a href="/">Home</a></li> 
              <li><a href="/checkout">Cart</a></li>
              <li><a href="/aboutus">Our Story</a></li>
          </ul> 
          <div class="nav_order_button">
            <a href="/menu"> <!-- Link to order page -->
              <button type="button" class="order_button">Order Now</button>
            </a>
          </div>
        </div>
        </nav>
    </header>

    <!--Carousel-->
    <div class="carousel">
      <div id="carouselExampleCaptions" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-indicators">
          <!-- Adds icons at the bottom -->
          <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active" aria-label="Slide 1" aria-current="true"></button>
          <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1" aria-label="Slide 2" class=""></button>
          <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2" aria-label="Slide 3" class=""></button>
          <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="3" aria-label="Slide 4" class=""></button>
        </div>
        <div class="carousel-inner">
          <div class="carousel-item active">
            <!-- carousel images -->
            <img src="/static/assets/burger1.jpg" class="d-block w-100" alt="carousel1">
            <div class="carousel-caption d-none d-md-block">
            </div>
          </div>
          <div class="carousel-item">
            <img src="/static/assets/burger2.jpg" class="d-block w-100" alt="carousel2">
            <div class="carousel-caption d-none d-md-block">
            </div>
          </div>
          <div class="carousel-item">
            <img src="/static/assets/burger3.jpg" class="d-block w-100" alt="carousel3">
            <div class="carousel-caption d-none d-md-block">
            </div>
          </div>
          <div class="carousel-item">
            <img src="/static/assets/burger4.jpg" class="d-block w-100" alt="carousel4">
            <div class="carousel-caption d-none d-md-block">
            </div>
          </div>
            <img src="/static/assets/carousel5.jpg" class="d-block w-100" alt="carousel5">
            <div class="carousel-caption d-none d-md-block">
            </div>
          </div>
        </div>
        <!-- carousel buttons -->
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
    </div>
    
    <!-- Cards Sections -->
    <div class="card-container"> <!-- div for entire container for cards -->
  <div class="card"> <!-- div for each card -->
    <img src="/static/assets/ordercard.jpg" alt="Order Now">
    <div class="card-content">
      <h3>Checkout</h3>
      <!-- button and link to order page -->
      <button><a href="/checkout" class="button-text">View your Cart</a></button>
    </div>
  </div>

  <div class="card">
    <img src="/static/assets/menucard.jpg" alt="View Menu">
    <div class="card-content">
      <h3>View Our Menu</h3>
      <!-- button and link to menu page -->
      <button><a href="/menu" class="button-text">View Menu</a></button>
    </div>
  </div>

  <div class="card">
    <img src="/static/assets/manburger.jpg" alt="About Us">
    <div class="card-content">
      <h3>About Us</h3>
      <!-- button and link to about page -->
      <button><a href="/aboutus" class="button-text">Learn More</a></button>
    </div>
  </div>
    </div>
    

    <!-- Footer -->
    <footer class="main-footer">
  <div class="footer-socials">
    <!-- Social media links (DESIGN PURPOSES ONLY) -->
    <a href="https://www.instagram.com"><i class="fab fa-instagram"></i></a>
    <a href="https://www.tiktok.com"><i class="fab fa-tiktok"></i></a> <!-- Social media links Icons -->
    <a href="https://www.facebook.com"><i class="fab fa-facebook"></i></a>
  </div>

  <ul class="footer-links">
    <!-- Footer links -->
    <li><a href="/">Home</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="/aboutus">About</a></li>
    <li><a href="#">Terms & Conditions</a></li>
    <li><a href="#">Privacy Policy</a></li>
  </ul>

  <!-- Copyright text -->
  <p class="footer-copyright">©2026 Beefy Buns New Zealand Company. All rights reserved.</p>
    </footer>
</body>
</html>
