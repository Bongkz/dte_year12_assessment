<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beefy Buns</title>
    <link rel="stylesheet" href="css/home_styles.css"> <!-- Link to css-->
    <!--Link to bootstrap carousel-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <link rel="shortcut icon" type="x-icon" href="images/logo.png">
</head>
<body>
    <!--Nav bar-->
    <span>
    <header>
      <nav class="nav_bar">
        <div class="nav_logo">
        <a href="home.html">
          <img class="logo" src="images/logo.png" alt="Beefy Buns Logo">
        </a>
        </div>
        <!--Nav links-->
        <ul class="nav_links">
            <li><a href="menu.html">Menu</a></li>
            <li><a href="#">Feedback</a></li>
            <li><a href="#">Support</a> </li>
        </ul> 
        <div class="nav_order_button">
          <a href="order.html">
            <button type="button" class="order_button">ORDER</button>
          </a>
        </div>
        </nav>
    </header>
    </span> 
    <!--Carousel-->
    <div class="carousel">
      <div id="carouselExampleCaptions" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-indicators">
          <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active" aria-label="Slide 1" aria-current="true"></button>
          <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1" aria-label="Slide 2" class=""></button>
          <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2" aria-label="Slide 3" class=""></button>
          <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="3" aria-label="Slide 4" class=""></button>
        </div>
        <div class="carousel-inner">
          <div class="carousel-item active">
            <!-- carousel images + text -->
            <img src="images/burger1.jpg" class="d-block w-100" alt="carousel1">
            <div class="carousel-caption d-none d-md-block">
            </div>
          </div>
          <div class="carousel-item">
            <img src="images/burger2.jpg" class="d-block w-100" alt="carousel2">
            <div class="carousel-caption d-none d-md-block">
            </div>
          </div>
          <div class="carousel-item">
            <img src="images/burger3.jpg" class="d-block w-100" alt="carousel3">
            <div class="carousel-caption d-none d-md-block">
            </div>
          </div>
          <div class="carousel-item">
            <img src="images/burger4.jpg" class="d-block w-100" alt="carousel4">
            <div class="carousel-caption d-none d-md-block">
            </div>
          </div>
            <img src="assets/carousel5.jpg" class="d-block w-100" alt="carousel5">
            <div class="carousel-caption d-none d-md-block">
            </div>
          </div>
        </div>
        <!-- carousel buttons -->
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
      </div>

</body>
</html>
